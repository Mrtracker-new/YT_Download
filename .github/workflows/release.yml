name: Release

# Push a version tag -> builds the Windows installer + portable exe and
# publishes a GitHub Release with auto-generated notes + the binaries.
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Or trigger manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write # needed to create the release + upload assets

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can diff from last tag

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "value=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: "YT Downloader ${{ steps.tag.outputs.value }}"
          releaseBody: |
            <p align="center"><b>YT Downloader ${{ steps.tag.outputs.value }}</b></p>

            A fast, offline desktop app for grabbing video and audio from **YouTube, Vimeo, SoundCloud, and [1000+ other sites](https://github.com/yt-dlp/yt-dlp/blob/master/supportedsites.md)**. No accounts, no cloud, no ads.

            ## ⬇️ Download & install
            1. Download **`YT.Downloader_x64-setup.exe`** from **Assets** below.
            2. Run it. Windows SmartScreen may warn (the build is unsigned) → **More info → Run anyway**.
            3. Launch the app. `yt-dlp` + `ffmpeg` download themselves on first run — nothing else to set up.

            > **Requirements:** Windows 10/11 (64-bit). ~10 MB installer; first launch fetches the downloader tools (~50 MB).

            ## ✨ Highlights
            | | |
            |---|---|
            | 🎥 **Video** | up to 1080p, or whatever the site offers |
            | 🎵 **Audio** | one-click MP3 extraction |
            | 📃 **Playlists** | fetch, cherry-pick, queue the whole thing |
            | ⚡ **Queue** | 3 downloads at once, live speed + ETA |
            | ⏯️ **Control** | pause / resume / cancel that truly kills the process |
            | 🕘 **History** | remembers what you grabbed |
            | 💬 **Subtitles** | burned into the MP4 or saved as `.srt` |

            ## ⚠️ Known quirks
            - **Instagram / X / private Vimeo** — log in via Chrome first; the app borrows your cookies.
            - **Long videos pause on a purple bar** — that's ffmpeg merging, not a freeze. Let it finish.

            ---
            <sub>🔒 Open source · built with Tauri 2 + Rust + React. Tip: click **Generate release notes** in the draft to append the full commit changelog.</sub>
          releaseDraft: true # review notes before publishing; flip to false to auto-publish
          prerelease: false
          includeUpdaterJson: false
